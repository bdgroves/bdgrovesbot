name: Daily Wildfire Update

on:
  schedule:
    - cron: '0 14 * * *'   # 7am Pacific (UTC-7 summer)
  workflow_dispatch:         # manual trigger from GitHub Actions UI

jobs:
  update-tuolumne:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pywikibot requests

      - name: Create logs directory
        run: mkdir -p logs

      - name: Write pywikibot credentials
        env:
          WIKI_BOT_PASSWORD: ${{ secrets.WIKI_BOT_PASSWORD }}
        run: |
          cat > user-config.py << 'PYEOF'
          family = 'wikipedia'
          mylang = 'en'
          usernames['wikipedia']['en'] = 'Bdgroves'
          password_file = 'passwords.py'
          PYEOF

          python - << PYEOF
          import os
          pwd = os.environ['WIKI_BOT_PASSWORD']
          with open('passwords.py', 'w') as f:
              f.write(f"('Bdgroves', BotPassword('bdgrovesbot', '{pwd}'))\n")
          PYEOF

      - name: Run Tuolumne bot
        run: python bot/tuolumne_bot.py --dry-run
