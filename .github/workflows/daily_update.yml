name: Daily Wildfire Update

on:
  schedule:
    - cron: '0 14 * * *'   # 7am Pacific (UTC-7 summer)
  workflow_dispatch:         # manual trigger from GitHub Actions UI

jobs:
  update-tuolumne:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pywikibot requests

      - name: Write pywikibot credentials
        run: |
          cat > user-config.py << 'PYEOF'
          family = 'wikipedia'
          mylang = 'en'
          usernames['wikipedia']['en'] = 'Bdgroves'
          PYEOF

      - name: Run Tuolumne bot dry run
        run: python bot/tuolumne_bot.py --dry-run
        # Change to: python bot/tuolumne_bot.py --no-dry-run
        # once you are ready to go live
