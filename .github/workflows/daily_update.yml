name: Daily Wildfire Update

on:
  schedule:
    - cron: '0 14 * * *'   # 7am Pacific (UTC-7)
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  update-tuolumne:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest

      - name: Write pywikibot config
        run: echo "${{ secrets.USER_CONFIG }}" > user-config.py

      - name: Run Tuolumne bot (dry run)
        run: pixi run dryrun
        # Change to: pixi run bot
        # once you're ready to go live
